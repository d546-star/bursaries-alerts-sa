name: Bursary SEO Engine

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
      - name: Clean public
        run: rm -rf public && mkdir -p public

    # NEW STEP (AUTOPILOT SCRAPE)
      - name: Fetch latest bursaries (V4 engine)
        run: node scraper.js

      - name: Build site (SAFE FIXED)
        run: |
          set -e

          echo "Cleaning public..."
          rm -rf public
          mkdir -p public/bursaries
          mkdir -p public/assets

          echo "Generating pages..."
          node generate-pages.js

          echo "Generating homepage..."
          node scripts/generate-homepage.js

          echo "Generating sitemap..."
          node generate-sitemap.js

          echo "Checking outputs..."

          # ✅ FIXED CHECK (correct path)
          if [ ! -f public/index.html ]; then
            echo "ERROR: public/index.html missing"
              echo "Debugging files:"
              find . -name "index.html"
              exit 1
            fi

          echo "Copying files..."
          cp public/index.html public/index.html || true
          cp public/sitemap.xml public/sitemap.xml || true
          cp -r bursaries public/ || true
          cp -r assets public/ || true

          touch public/.nojekyll

          echo "Build complete"
          
      - name: Validate homepage exists
        run: |
          if [ ! -f public/index.html ]; then
            echo "FATAL: index.html missing"
            exit 1
          fi
      - name: Validate output (FAIL SAFE)
        run: |
          test -f public/index.html
          test -f public/sitemap.xml

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - uses: actions/setup-node@v4
        with:
         node-version: 22
