name: Bursary SEO Engine

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
      - name: Clean public
        run: rm -rf public && mkdir -p public

    # NEW STEP (AUTOPILOT SCRAPE)
      - name: Fetch latest bursaries (V4 engine)
        run: node scraper.js

      - name: Build site
        run: |
          rm -rf public
          mkdir -p public

          node generate-pages.js
          node scripts/generate-homepage.js
          node generate-sitemap.js

          touch public/.nojekyll

      - name: Validate output (FAIL SAFE)
        run: |
          test -f public/index.html
          test -f public/sitemap.xml

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - uses: actions/deploy-pages@v4
