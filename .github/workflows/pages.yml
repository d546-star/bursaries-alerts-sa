name: Bursary Site (Auto Build + Deploy)

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      # =========================
      # CLEAN BUILD FIRST (IMPORTANT)
      # =========================
      - name: Prepare public folder
        run: |
          rm -rf public
          mkdir -p public/bursaries
          mkdir -p public/assets

      # =========================
      # BUILD EVERYTHING INTO PUBLIC
      # =========================
      - name: Generate full SEO system
       run: node generate-seo-pages.js

      # =========================
      # SAFETY CHECK (REAL FIX)
      # =========================
      - name: Validate build
        run: |
          echo "Checking build output..."
          ls -R public

          if [ ! -f public/index.html ]; then
            echo "ERROR: Missing public/index.html"
            exit 1
          fi

          if [ ! -f public/sitemap.xml ]; then
            echo "ERROR: Missing public/sitemap.xml"
            exit 1
          fi

      # =========================
      # DEPLOY
      # =========================
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    # 🔥 THIS FIXES YOUR ERROR
    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
