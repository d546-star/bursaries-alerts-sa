name: Bursary SEO Engine

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

    # NEW STEP (AUTOPILOT SCRAPE)
      - name: Fetch latest bursaries (V4 engine)
        run: node scraper.js

      - name: Generate SEO pages
        run: node generate-pages.js

      - name: Generate homepage
        run: node generators/homepage.js

      - name: Generate sitemap
        run: node generate-sitemap.js

      - name: Clean public
        run: rm -rf public && mkdir -p public

      - name: Generate SEO system
        run: node generate-pages.js

      - name: Generate homepage
        run: node generators/homepage.js

      - name: Generate sitemap
        run: node generate-sitemap.js

      - name: Validate output (FAIL SAFE)
        run: |
          test -f public/index.html
          test -f public/sitemap.xml

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - uses: actions/deploy-pages@v4
