name: Daily Bursary Update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      # =========================
      # BUILD PHASE
      # =========================
      - name: Generate bursary pages
        run: node generate-pages.js

      - name: Generate homepage
        run: node scripts/generate-homepage.js

      - name: Generate sitemap
        run: node generate-sitemap.js

      # =========================
      # DEPLOY FOLDER SETUP
      # =========================
      - name: Prepare public folder
        run: |
          rm -rf public
          mkdir -p public/bursaries
          mkdir -p public/assets

      # =========================
      # COPY OUTPUT FILES (FIXED)
      # =========================
      - name: Move generated files into public
        run: |
          cp index.html public/ || true
          cp sitemap.xml public/ || true
          cp -r bursaries public/ || true
          cp -r assets public/ || true
          touch public/.nojekyll

      # =========================
      # DEPLOY
      # =========================
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
